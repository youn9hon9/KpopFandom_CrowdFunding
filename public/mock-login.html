<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개발자 로그인 시뮬레이터 — Duckrowd</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .simulator-body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 24px;
    }
    .simulator-card {
      width: 100%;
      max-width: 480px;
      background: var(--color-bg);
      border-radius: var(--radius-md);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
    }
    .sim-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .sim-badge {
      display: inline-block;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 700;
      border-radius: var(--radius-full);
      margin-bottom: 12px;
    }
    .sim-badge--google {
      background: #f1f3f4;
      color: #3c4043;
      border: 1px solid #dadce0;
    }
    .sim-badge--kakao {
      background: #fee500;
      color: #191919;
    }
    .sim-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--color-text);
      margin-bottom: 8px;
    }
    .sim-subtitle {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      line-height: 1.4;
    }
    .profile-presets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .preset-btn {
      padding: 12px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: var(--color-bg);
      transition: all 0.2s;
    }
    .preset-btn:hover {
      border-color: var(--color-primary);
      background: rgba(0, 196, 113, 0.02);
    }
    .preset-btn.active {
      border-color: var(--color-primary);
      background: rgba(0, 196, 113, 0.05);
      font-weight: 700;
    }
    .preset-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--color-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    .preset-name {
      font-size: 0.85rem;
      color: var(--color-text);
    }
    .preset-role {
      font-size: 0.7rem;
      color: var(--color-text-muted);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      border-color: var(--color-primary);
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      border-radius: var(--radius-sm);
      margin-top: 10px;
      transition: background-color 0.2s;
    }
    .btn-submit--google {
      background: #4285f4;
    }
    .btn-submit--google:hover {
      background: #357ae8;
    }
    .btn-submit--kakao {
      background: #fee500;
      color: #191919;
    }
    .btn-submit--kakao:hover {
      background: #fada0a;
    }
    .btn-cancel {
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--color-text-muted);
      text-decoration: underline;
    }
  </style>
</head>
<body class="simulator-body">
  <div class="simulator-card">
    <div class="sim-header">
      <span id="sim-badge" class="sim-badge">Google</span>
      <h1 class="sim-title">개발자 로그인 시뮬레이터</h1>
      <p class="sim-subtitle">OAuth 자격 증명이 구성되지 않아 시뮬레이션 환경으로 진입했습니다. 가상의 계정을 선택하거나 직접 입력하여 테스트할 수 있습니다.</p>
    </div>

    <div class="form-group">
      <label class="form-label">테스트 계정 프리셋 선택</label>
      <div class="profile-presets" id="presets-container">
        <!-- Presets load dynamically -->
      </div>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="input-name" class="form-label">사용자 이름 (별명)</label>
        <input type="text" id="input-name" class="form-input" required placeholder="예: 홍길동">
      </div>
      <div class="form-group">
        <label for="input-email" class="form-label">이메일 주소</label>
        <input type="email" id="input-email" class="form-input" required placeholder="예: user@example.com">
      </div>
      <div class="form-group">
        <label for="input-avatar" class="form-label">프로필 이미지 URL (선택)</label>
        <input type="url" id="input-avatar" class="form-input" placeholder="https://...">
      </div>

      <button type="submit" id="submit-btn" class="btn-submit">로그인 완료</button>
    </form>
    
    <a href="/" class="btn-cancel">로그인 취소하고 돌아가기</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const provider = params.get('provider') || 'google';
    const redirectUri = params.get('redirect_uri') || `/${provider}/callback`;

    const presets = {
      google: [
        { name: '김별빛 (Google)', email: 'star_light@gmail.com', avatar: '⭐', role: '프로젝트 총대' },
        { name: '도토리 (Google)', email: 'dotori_fan@gmail.com', avatar: '🐿️', role: '일반 후원자' }
      ],
      kakao: [
        { name: '이민들레 (Kakao)', email: 'dandelion_k@daum.net', avatar: '🌼', role: '프로젝트 총대' },
        { name: '초코쿠키 (Kakao)', email: 'chocobiscuit@kakao.com', avatar: '🍪', role: '일반 후원자' }
      ]
    };

    const providerPresets = presets[provider] || presets['google'];

    // Setup Header and Badge Styles
    const badgeEl = document.getElementById('sim-badge');
    const submitBtn = document.getElementById('submit-btn');

    if (provider === 'google') {
      badgeEl.className = 'sim-badge sim-badge--google';
      badgeEl.textContent = 'Google Auth Simulator';
      submitBtn.className = 'btn-submit btn-submit--google';
    } else {
      badgeEl.className = 'sim-badge sim-badge--kakao';
      badgeEl.textContent = 'Kakao Auth Simulator';
      submitBtn.className = 'btn-submit btn-submit--kakao';
    }

    // Load Presets
    const presetsContainer = document.getElementById('presets-container');
    const nameInput = document.getElementById('input-name');
    const emailInput = document.getElementById('input-email');
    const avatarInput = document.getElementById('input-avatar');

    function selectPreset(preset, btn) {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      nameInput.value = preset.name;
      emailInput.value = preset.email;
      avatarInput.value = ''; // keep empty for custom, or can put placeholder
    }

    providerPresets.forEach((p, idx) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'preset-btn';
      if (idx === 0) btn.className += ' active';
      btn.innerHTML = `
        <div class="preset-avatar">${p.avatar}</div>
        <div class="preset-name">${p.name}</div>
        <div class="preset-role">${p.role}</div>
      `;
      btn.addEventListener('click', () => selectPreset(p, btn));
      presetsContainer.appendChild(btn);

      // Default select the first one
      if (idx === 0) {
        nameInput.value = p.name;
        emailInput.value = p.email;
      }
    });

    // Handle Form Submit
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const finalName = nameInput.value.trim();
      const finalEmail = emailInput.value.trim();
      const finalAvatar = avatarInput.value.trim();

      const url = new URL(redirectUri, window.location.origin);
      url.searchParams.set('mock', 'true');
      url.searchParams.set('name', finalName);
      url.searchParams.set('email', finalEmail);
      if (finalAvatar) {
        url.searchParams.set('avatar', finalAvatar);
      }

      window.location.href = url.toString();
    });
  </script>
</body>
</html>
